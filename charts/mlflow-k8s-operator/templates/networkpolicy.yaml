{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "mlflow-k8s-operator.fullname" . }}
  labels:
    {{- include "mlflow-k8s-operator.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "mlflow-k8s-operator.selectorLabels" . | nindent 6 }}
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # Allow metrics and health probes from monitoring systems
  - ports:
    - port: {{ .Values.service.metricsPort }}
      protocol: TCP
    - port: {{ .Values.service.healthPort }}
      protocol: TCP
  # Allow webhook traffic if webhook is enabled
  {{- if .Values.webhook.enabled }}
  - ports:
    - port: 9443
      protocol: TCP
  {{- end }}
  egress:
  # Allow DNS resolution
  - ports:
    - port: 53
      protocol: TCP
    - port: 53
      protocol: UDP
  # Allow API server communication
  - to:
    - namespaceSelector: {}
    ports:
    - port: 443
      protocol: TCP
  {{- if .Values.networkPolicy.egress }}
  {{- toYaml .Values.networkPolicy.egress | nindent 2 }}
  {{- end }}
{{- end }}
