apiVersion: v1
kind: Service
metadata:
  name: {{ include "mlflow-k8s-operator.fullname" . }}
  labels:
    {{- include "mlflow-k8s-operator.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
  - port: {{ .Values.service.port }}
    targetPort: 80
    protocol: TCP
    name: http
  - port: {{ .Values.service.metricsPort }}
    targetPort: {{ .Values.service.metricsPort }}
    protocol: TCP
    name: metrics
  selector:
    {{- include "mlflow-k8s-operator.selectorLabels" . | nindent 4 }}
