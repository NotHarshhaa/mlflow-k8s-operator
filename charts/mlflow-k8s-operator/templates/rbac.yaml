{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "mlflow-k8s-operator.serviceAccountName" . }}
  labels:
    {{- include "mlflow-k8s-operator.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "mlflow-k8s-operator.fullname" . }}-manager-role
  labels:
    {{- include "mlflow-k8s-operator.labels" . | nindent 4 }}
rules:
- apiGroups:
  - mlops.your-org.io
  resources:
  - mlflowservers
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - mlops.your-org.io
  resources:
  - mlflowservers/finalizers
  verbs:
  - update
- apiGroups:
  - mlops.your-org.io
  resources:
  - mlflowservers/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - apps
  resources:
  - deployments
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - ""
  resources:
  - configmaps
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - ""
  resources:
  - persistentvolumeclaims
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - ""
  resources:
  - secrets
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - ""
  resources:
  - services
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - networking.k8s.io
  resources:
  - ingresses
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "mlflow-k8s-operator.fullname" . }}-manager-rolebinding
  labels:
    {{- include "mlflow-k8s-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "mlflow-k8s-operator.fullname" . }}-manager-role
subjects:
- kind: ServiceAccount
  name: {{ include "mlflow-k8s-operator.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
