# Default values for mlflow-k8s-operator
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: ghcr.io/NotHarshhaa/mlflow-k8s-operator
  pullPolicy: IfNotPresent
  tag: "1.0.0"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65534
  runAsGroup: 65534
  fsGroup: 65534
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
    - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 65534

service:
  type: ClusterIP
  port: 80
  metricsPort: 8080
  healthPort: 8081

resources:
  limits:
    cpu: 1000m
    memory: 1Gi
  requests:
    cpu: 100m
    memory: 256Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

# Multi-tenancy configuration
multitenancy:
  enabled: false
  allowedNamespaces: []

# Network policy configuration
networkPolicy:
  enabled: false
  # Additional egress rules
  egress: []

# Webhook configuration
webhook:
  enabled: false

# Pod Disruption Budget configuration
podDisruptionBudget:
  enabled: false
  # minAvailable: 1
  # maxUnavailable: 1

# Controller configuration
controller:
  manager:
    args:
      - --leader-elect=false

# Security configuration
security:
  # Pod Security Standard level: privileged, baseline, restricted
  podSecurityStandard: restricted

  # Pod-level security context
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 65534
    runAsGroup: 65534
    fsGroup: 65534
    seccompProfile:
      type: RuntimeDefault

  # Container-level security context
  containerSecurityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    runAsUser: 65534
    capabilities:
      drop:
        - ALL

  # Network policy configuration
  networkPolicy:
    enabled: true
    policyType: restrictive  # permissive, restrictive, custom
    allowedNamespaces: []
    allowedIPRanges: []

  # Service account security
  serviceAccount:
    create: true
    automountServiceAccountToken: false
    boundServiceAccountToken: true
    tokenExpiration: "3600s"
    annotations: {}

  # Image security
  imageSecurity:
    pullPolicy: IfNotPresent  # Always, IfNotPresent, Never
    imagePullSecrets: []
    signatureVerification:
      enabled: false
      keySecret: ""
      cosignRepository: ""
    vulnerabilityScan:
      enabled: false
      failOnVulnerabilities: true
      severityThreshold: HIGH  # CRITICAL, HIGH, MEDIUM, LOW

  # Anti-affinity configuration
  antiAffinity:
    enabled: true
    topologyKey: kubernetes.io/hostname
    spreadAcrossNodes: true
    spreadAcrossZones: false

  # RBAC security
  rbac:
    enabled: false
    roleName: ""
    roleBindingName: ""
    subjects: []
    resourceQuota:
      enabled: false
      cpu: ""
      memory: ""
      storage: ""
      pods: ""

  # External secret management
  secretManagement:
    type: ""  # vault, aws-secrets-manager, azure-key-vault, gcp-secret-manager
    vault:
      address: ""
      authMethod: kubernetes
      role: ""
      secretPath: ""
      namespace: ""
    awsSecretsManager:
      region: ""
      secretPrefix: ""
      credentialsSecret: ""
    azureKeyVault:
      vaultName: ""
      tenantId: ""
      credentialsSecret: ""
    gcpSecretManager:
      project: ""
      secretPrefix: ""
      credentialsSecret: ""
