name: Build and Push Docker Image (Sequential)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  REGISTRY_GHCR: ghcr.io
  REGISTRY_DOCKER: docker.io
  IMAGE_NAME_GHCR: ghcr.io/notharshhaa/mlflow-k8s-operator
  IMAGE_NAME_DOCKER: harshhaareddy/mlflow-k8s-operator

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_GHCR }}
          username: ${{ github.actor }}
          password: ${{ secrets.GH_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_DOCKER }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata (tags, labels) for GHCR
        id: meta-ghcr
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME_GHCR }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=MLflow Kubernetes Operator
            org.opencontainers.image.description=Kubernetes operator for MLflow
            org.opencontainers.image.vendor=NotHarshhaa

      - name: Extract metadata (tags, labels) for Docker Hub
        id: meta-docker
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME_DOCKER }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=MLflow Kubernetes Operator
            org.opencontainers.image.description=Kubernetes operator for MLflow
            org.opencontainers.image.vendor=NotHarshhaa

      # Build amd64 first
      - name: Build amd64
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: false
          load: true
          tags: temp-amd64:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT_SHA=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
          provenance: false

      # Build arm64
      - name: Build arm64
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/arm64
          push: false
          tags: temp-arm64:latest
          cache-from: type=gha
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT_SHA=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
          provenance: false

      # Create and push manifest to GHCR
      - name: Create and push manifest to GHCR
        run: |
          docker manifest create ${{ env.IMAGE_NAME_GHCR }}:${{ github.ref_name }} \
            temp-amd64:latest \
            temp-arm64:latest
          
          docker manifest push ${{ env.IMAGE_NAME_GHCR }}:${{ github.ref_name }}
          
          # Tag and push latest if on main branch
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            docker tag ${{ env.IMAGE_NAME_GHCR }}:${{ github.ref_name }} ${{ env.IMAGE_NAME_GHCR }}:latest
            docker push ${{ env.IMAGE_NAME_GHCR }}:latest
          fi

      # Create and push manifest to Docker Hub
      - name: Create and push manifest to Docker Hub
        run: |
          docker manifest create ${{ env.IMAGE_NAME_DOCKER }}:${{ github.ref_name }} \
            temp-amd64:latest \
            temp-arm64:latest
          
          docker manifest push ${{ env.IMAGE_NAME_DOCKER }}:${{ github.ref_name }}
          
          # Tag and push latest if on main branch
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            docker tag ${{ env.IMAGE_NAME_DOCKER }}:${{ github.ref_name }} ${{ env.IMAGE_NAME_DOCKER }}:latest
            docker push ${{ env.IMAGE_NAME_DOCKER }}:latest
          fi

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            ## Docker Images
            - GHCR: ${{ env.IMAGE_NAME_GHCR }}:${{ github.ref_name }}
            - Docker Hub: ${{ env.IMAGE_NAME_DOCKER }}:${{ github.ref_name }}
            
            ## Changes
            See the commit history for details.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
