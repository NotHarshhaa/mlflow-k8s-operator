apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: mlflow-k8s-operator-manager-role
rules:
- apiGroups:
  - mlops.your-org.io
  resources:
  - mlflowservers
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - mlops.your-org.io
  resources:
  - mlflowservers/finalizers
